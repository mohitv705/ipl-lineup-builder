<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPL 2026 | PRO BUILDER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --team-accent: #fadb12; --bg: #05070a; --glass: rgba(255, 255, 255, 0.07); --border: rgba(255, 255, 255, 0.12); }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'Outfit', sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, var(--team-accent) 0%, transparent 50%); opacity: 0.1; filter: blur(60px); z-index: -1; }

        /* Mobile Header - Sticky */
        header {
            padding: 20px 20px 10px; background: rgba(5,7,10,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 20;
        }

        /* Order Section - Scrollable Middle */
        .order-container {
            flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch;
        }

        /* Squad Shelf - Bottom Section */
        .squad-shelf {
            background: #0a0f19; border-top: 1px solid var(--border);
            padding: 15px; max-height: 40vh; overflow-y: auto;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        /* Typography */
        h1 { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--team-accent); margin: 0 0 10px; text-transform: uppercase; }
        .team-display { font-size: 24px; font-weight: 900; margin-bottom: 15px; }

        /* Form Elements */
        select, .search-bar { 
            background: #111; color: #fff; border: 1px solid var(--border); 
            padding: 12px; border-radius: 12px; width: 100%; font-size: 14px; margin-bottom: 10px;
        }

        /* Squad Cards */
        .squad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .p-card { 
            background: var(--glass); border: 1px solid var(--border); padding: 12px 5px; 
            border-radius: 12px; text-align: center; font-size: 10px; font-weight: 700;
            text-transform: uppercase; active: scale(0.95); transition: 0.2s;
        }
        .p-card.is-os::after { content: '✈'; font-size: 8px; margin-left: 4px; color: var(--team-accent); }
        .p-card.selected { opacity: 0.1; pointer-events: none; }

        /* Batting Order Styling */
        .order-row { 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; 
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
            border-left: 4px solid var(--team-accent);
        }
        .num { font-weight: 900; color: var(--team-accent); width: 18px; font-size: 14px; }
        .name-cell { flex: 1; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        
        .badge-btn { 
            background: #222; border: 1px solid #444; color: #fff; width: 28px; height: 28px; 
            border-radius: 6px; font-size: 9px; font-weight: 900;
        }
        .badge-btn.active { background: var(--team-accent); color: #000; }
        
        .controls { display: flex; gap: 4px; }
        .controls button { background: #333; border: none; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 10px; }

        /* Action Bar - Fixed Bottom */
        .action-bar {
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            background: #050710; border-top: 1px solid var(--border);
        }
        .export-btn { 
            background: #fff; color: #000; padding: 16px; border-radius: 14px; 
            border: none; font-weight: 900; text-transform: uppercase; width: 100%; font-size: 14px;
        }

        /* Export Container (Hidden) */
        #export-container { position: absolute; left: -5000px; width: 1080px; height: 1350px; background: #05070a; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<header>
    <h1>Franchise Selection</h1>
    <select id="teamSelect" onchange="initTeam()"></select>
    <div id="teamDisplay" class="team-display">SELECT TEAM</div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="osCount" style="font-size:10px; font-weight:900; color:#64748b;">OS: 0/4</span>
        <div id="progressBar" style="width:100px; height:4px; background:#222; border-radius:10px;"><div id="progressFill" style="height:100%; width:0%; background:var(--team-accent); border-radius:10px;"></div></div>
    </div>
</header>

<div class="order-container" id="orderList">
    </div>

<div class="squad-shelf">
    <h1>Squad Pool</h1>
    <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player..." oninput="filterSquad()">
    <div class="squad-grid" id="squadGrid"></div>
</div>

<div class="action-bar">
    <div id="impactDisplay" style="color:#ef4444; font-size:10px; font-weight:900; text-align:center; margin-bottom:10px;">IMPACT SUB: PENDING</div>
    <button class="export-btn" onclick="exportGraphic()">Download Team Graphic</button>
</div>

<div id="export-container">
    <div id="exp-content"></div>
</div>

<script>
    const teamData = {
        "Chennai Super Kings": { color: "#FADF12", squad: ["Ruturaj Gaikwad (c)", "Ayush Mhatre", "M.S. Dhoni", "Sanju Samson", "Dewald Brevis (O)", "Urvil Patel", "Shivam Dube", "Jamie Overton (O)", "Ramakrishna Ghosh", "Noor Ahmad (O)", "Khaleel Ahmed", "Anshul Kamboj", "Gurjapneet Singh", "Shreyas Gopal", "Mukesh Choudhary", "Nathan Ellis (O)", "Akeal Hosein (O)", "Prashant Veer", "Kartik Sharma", "Matthew Short (O)", "Aman Khan", "Sarfaraz Khan", "Matt Henry (O)", "Rahul Chahar", "Zak Foulkes (O)"] },
        "Rajasthan Royals": { color: "#EA1A85", squad: ["Ravindra Jadeja", "Sam Curran (O)", "Donovan Ferreira (O)", "Sandeep Sharma", "Shubham Dubey", "Vaibhav Suryavanshi", "Lhuan-Dre Pretorius (O)", "Shimron Hetmyer (O)", "Yashasvi Jaiswal", "Dhruv Jurel", "Riyan Parag", "Yudhvir Singh Charak", "Jofra Archer (O)", "Tushar Deshpande", "Kwena Maphaka (O)", "Nandre Burger (O)", "Ravi Bishnoi", "Sushant Mishra", "Yash Raj Punja", "Vignesh Puthur", "Ravi Singh", "Aman Rao", "Brijesh Sharma", "Adam Milne (O)", "Kuldeep Sen"] },
        "Kolkata Knight Riders": { color: "#742782", squad: ["Ajinkya Rahane", "Angkrish Raghuvanshi", "Anukul Roy", "Harshit Rana", "Manish Pandey", "Ramandeep Singh", "Rinku Singh", "Rovman Powell (O)", "Sunil Narine (O)", "Umran Malik", "Vaibhav Arora", "Varun Chakaravarthy", "Cameron Green (O)", "Finn Allen (O)", "Matheesha Pathirana (O)", "Tejasvi Singh", "Kartik Tyagi", "Prashant Solanki", "Rahul Tripathi", "Tim Seifert (O)", "Sarthak Ranjan", "Daksh Kamra", "Rachin Ravindra (O)", "Akash Deep", "Blessing Muzarabani (O)"] },
        "Lucknow Super Giants": { color: "#0057E2", squad: ["Abdul Samad", "Ayush Badoni", "Aiden Markram (O)", "Matthew Breetzke (O)", "Himmat Singh", "Rishabh Pant (c)", "Nicholas Pooran (O)", "Mitchell Marsh (O)", "Shahbaz Ahmed", "Arshin Kulkarni", "Mayank Yadav", "Avesh Khan", "Mohsin Khan", "Manimaran Siddharth", "Digvesh Rathi", "Prince Yadav", "Akash Singh", "Mohammed Shami", "Arjun Tendulkar", "Wanindu Hasaranga (O)", "Anrich Nortje (O)", "Mukul Choudhary", "Naman Tiwari", "Akshat Raghuwanshi", "Josh Inglis (O)"] },
        "SunRisers Hyderabad": { color: "#F26522", squad: ["Pat Cummins (c) (O)", "Travis Head (O)", "Abhishek Sharma", "Aniket Verma", "R. Smaran", "Ishan Kishan", "Heinrich Klaasen (O)", "Nitish Kumar Reddy", "Harsh Dubey", "Kamindu Mendis (O)", "Harshal Patel", "Brydon Carse (O)", "Jaydev Unadkat", "Eshan Malinga (O)", "Zeeshan Ansari", "Shivang Kumar", "Salil Arora", "Sakib Hussain", "Onkar Tarmale", "Amit Kumar", "Praful Hinge", "Krains Fuletra", "Liam Livingstone (O)", "Shivam Mavi", "Jack Edwards (O)"] },
        "Delhi Capitals": { color: "#0044BB", squad: ["Nitish Rana", "Abishek Porel", "Ajay Mandal", "Ashutosh Sharma", "Axar Patel", "Dushmantha Chameera (O)", "Karun Nair", "KL Rahul", "Kuldeep Yadav", "Madhav Tiwari", "Mitchell Starc (O)", "Sameer Rizvi", "T Natarajan", "Tripurana Vijay", "Tristan Stubbs (O)", "Vipraj Nigam", "David Miller (O)", "Ben Duckett (O)", "Auqib Nabi", "Pathum Nissanka (O)", "Lungi Ngidi (O)", "Sahil Parakh", "Prithvi Shaw", "Kyle Jamieson (O)"] },
        "Gujarat Titans": { color: "#1b2133", squad: ["Shubman Gill (c)", "Sai Sudharsan", "Kumar Kushagra", "Anuj Rawat", "Jos Buttler (O)", "Nishant Sindhu", "Washington Sundar", "Glenn Phillips (O)", "Arshad Khan", "Shahrukh Khan", "Rahul Tewatia", "Kagiso Rabada (O)", "Mohammed Siraj", "Prasidh Krishna", "Ishant Sharma", "Gurnoor Singh Brar", "Rashid Khan (O)", "Manav Suthar", "Sai Kishore", "Jayant Yadav", "Ashok Sharma", "Jason Holder (O)", "Tom Banton (O)", "Prithvi Raj Yarra", "Luke Wood (O)"] },
        "Mumbai Indians": { color: "#004B8D", squad: ["Hardik Pandya", "Rohit Sharma", "Suryakumar Yadav", "Tilak Varma", "Ryan Rickleton (O)", "Robin Minz", "Raj Bawa", "Raghu Sharma", "Mitchell Santner (O)", "Corbin Bosch (O)", "Naman Dhir", "Jasprit Bumrah", "Trent Boult (O)", "Allah Ghafanzar (O)", "Ashwani Kumar", "Deepak Chahar", "Will Jacks (O)", "Sherfane Rutherford (O)", "Mayank Markande", "Shardul Thakur", "Quinton de Kock (O)", "Danish Malewar", "Mohammad Izhar", "Atharva Ankolekar", "Mayank Rawat"] },
        "Punjab Kings": { color: "#ED1B24", squad: ["Prabhsimran Singh", "Priyansh Arya", "Shreyas Iyer", "Shashank Singh", "Nehal Wadhera", "Marcus Stoinis (O)", "Azmatullah Omarzai (O)", "Marco Jansen (O)", "Harpreet Brar", "Yuzvendra Chahal", "Arshdeep Singh", "Musheer Khan", "Pyala Avinash", "Harnoor Pannu", "Suryansh Shedge", "Mitchell Owen (O)", "Xavier Bartlett (O)", "Lockie Ferguson (O)", "Vyshak Vijaykumar", "Yash Thakur", "Vishnu Vinod", "Cooper Connolly (O)", "Ben Dwarshuis (O)", "Pravin Dubey", "Vishal Nishad"] },
        "Royal Challengers Bengaluru": { color: "#E63329", squad: ["Rajat Patidar (c)", "Virat Kohli", "Devdutt Padikkal", "Phil Salt (O)", "Jitesh Sharma", "Krunal Pandya", "Swapnil Singh", "Tim David (O)", "Romario Shepherd (O)", "Jacob Bethell (O)", "Josh Hazlewood (O)", "Yash Dayal", "Bhuvneshwar Kumar", "Nuwan Thushara (O)", "Rasikh Salam", "Abhinandan Singh", "Suyash Sharma", "Venkatesh Iyer", "Jacob Duffy (O)", "Satvik Deswal", "Mangesh Yadav", "Jordan Cox (O)", "Vicky Ostwal", "Vihaan Malhotra", "Kanishk Chouhan"] }
    };

    let selected = [];
    let roles = {};

    function initTeam() {
        const teamKey = document.getElementById('teamSelect').value;
        document.documentElement.style.setProperty('--team-accent', teamData[teamKey].color);
        document.getElementById('teamDisplay').innerText = teamKey.toUpperCase();
        selected = []; roles = {};
        renderSquad();
        updateUI();
    }

    function renderSquad(filterText = '') {
        const teamKey = document.getElementById('teamSelect').value;
        const grid = document.getElementById('squadGrid');
        grid.innerHTML = '';
        teamData[teamKey].squad.sort().forEach(p => {
            if (filterText && !p.toLowerCase().includes(filterText.toLowerCase())) return;
            const div = document.createElement('div');
            div.className = `p-card ${p.includes('(O)') ? 'is-os' : ''}`;
            div.innerHTML = p.replace(' (O)', '');
            div.onclick = () => { if (selected.length < 12) { selected.push(p); updateUI(); } };
            grid.appendChild(div);
        });
    }

    function filterSquad() { renderSquad(document.getElementById('playerSearch').value); updateUI(); }

    function updateUI() {
        const list = document.getElementById('orderList');
        const teamKey = document.getElementById('teamSelect').value;
        list.innerHTML = '';
        let osCount = 0;

        document.querySelectorAll('.p-card').forEach(card => {
            const name = card.innerText;
            card.className = selected.some(s => s.startsWith(name)) ? 'p-card selected' : (card.className.includes('is-os') ? 'p-card is-os' : 'p-card');
        });

        selected.slice(0, 11).forEach((p, i) => {
            if (p.includes('(O)')) osCount++;
            const row = document.createElement('div');
            row.className = 'order-row';
            row.innerHTML = `<span class="num">${i+1}</span><span class="name-cell">${p.replace(' (O)', '')}</span>
                <button class="badge-btn ${roles[p]?.c ? 'active' : ''}" onclick="toggleRole('${p}','c')">C</button>
                <button class="badge-btn ${roles[p]?.wk ? 'active' : ''}" onclick="toggleRole('${p}','wk')">WK</button>
                <div class="controls"><button onclick="move(${i},-1)">▲</button><button onclick="move(${i},1)">▼</button><button onclick="removeP(${i})" style="color:#ef4444">✖</button></div>`;
            list.appendChild(row);
        });

        document.getElementById('osCount').innerText = `OS: ${osCount}/4`;
        document.getElementById('osCount').style.color = osCount > 4 ? "#ef4444" : "#64748b";
        document.getElementById('progressFill').style.width = (selected.length / 12 * 100) + "%";
        document.getElementById('impactDisplay').innerText = selected[11] ? "IMPACT SUB: " + selected[11].replace(' (O)', '').toUpperCase() : "IMPACT SUB: PENDING";
    }

    function toggleRole(p, role) { roles[p] = roles[p] || {c:false, wk:false}; roles[p][role] = !roles[p][role]; updateUI(); }
    function move(idx, dir) { if (idx+dir>=0 && idx+dir<11) { [selected[idx], selected[idx+dir]]=[selected[idx+dir], selected[idx]]; updateUI(); } }
    function removeP(idx) { selected.splice(idx, 1); updateUI(); }

    async function exportGraphic() {
        if (selected.length < 12) return alert("Select 11 + Impact Player!");
        const teamKey = document.getElementById('teamSelect').value;
        const team = teamData[teamKey];
        const container = document.getElementById('export-container');
        
        container.innerHTML = `
            <div style="height:280px; background:${team.color}; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#000;">
                <div style="font-size:25px; font-weight:900; letter-spacing:5px; margin-bottom:10px; opacity:0.7;">PLAYING 11</div>
                <div style="font-family:'Oswald'; font-size:100px; line-height:0.9;">${teamKey.toUpperCase()}</div>
            </div>
            <div style="flex:1; padding:40px; display:grid; grid-template-columns: 1fr 1fr; gap:20px; align-content:start;">
                ${selected.slice(0, 11).map((p, i) => {
                    let lbl = (roles[p]?.c ? " (C)" : "") + (roles[p]?.wk ? " (WK)" : "");
                    return `<div style="background:rgba(255,255,255,0.04); border-left:8px solid ${team.color}; padding:15px 25px; display:flex; align-items:center; gap:20px; border-radius:5px;">
                        <span style="font-family:'Oswald'; font-size:40px; color:${team.color}">${i+1}</span>
                        <span style="font-size:35px; font-weight:900; color:#fff">${p.replace(' (O)', '').toUpperCase()}${lbl}</span>
                    </div>`;
                }).join('')}
            </div>
            <div style="height:120px; background:#ef4444; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900; font-family:'Oswald'; color:#fff;">
                IMPACT SUB: ${selected[11].replace(' (O)', '').toUpperCase()}
            </div>
        `;

        const canvas = await html2canvas(container, { scale: 1 });
        const link = document.createElement('a');
        link.download = teamKey + "_Draft.png";
        link.href = canvas.toDataURL(); link.click();
    }

    const ts = document.getElementById('teamSelect');
    Object.keys(teamData).forEach(t => ts.add(new Option(t, t)));
    initTeam();
</script>
</body>
</html>
